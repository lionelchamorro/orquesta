version: 2
updates:
  # Keep pinned GitHub Actions up to date, grouped into a single weekly PR.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Wait a few days after a release before opening update PRs, to dodge
    # freshly-published (and potentially compromised) versions.
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  # Python dependencies via uv (drop this block for non-uv / non-Python repos).
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
