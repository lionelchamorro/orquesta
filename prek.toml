# MARK: uv-lock
[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.10.7"
hooks = [{ id = "uv-lock", priority = 0 }]

# MARK: pre-commit-hooks
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

# MARK: check-merge-conflict
[[repos.hooks]]
id = "check-merge-conflict"
priority = 0

# MARK: check-added-large-files
[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=750"]
exclude = "^uv\\.lock$"
priority = 0

# MARK: check-toml
[[repos.hooks]]
id = "check-toml"
priority = 0

# MARK: check-yaml
[[repos.hooks]]
id = "check-yaml"
args = ["--unsafe"]
priority = 0

# MARK: end-of-file-fixer
[[repos.hooks]]
id = "end-of-file-fixer"
priority = 0

# MARK: trailing-whitespace
[[repos.hooks]]
id = "trailing-whitespace"
priority = 0

# MARK: betterleaks
# Secret scanner (gitleaks fork). language = "golang" so prek builds it from the
# pinned tag in an isolated toolchain. Scans staged changes on commit; --redact
# keeps any matched secret out of the output.
[[repos]]
repo = "https://github.com/betterleaks/betterleaks"
rev = "v1.5.0"
hooks = [{ id = "betterleaks", priority = 0 }]

# MARK: agents-conventional-commits
# CES-75: the commit subject must follow Conventional Commits (type(scope): description).
# Runs at the commit-msg stage on the message file; merge/revert/fixup subjects are exempt.
[[repos]]
repo = "local"

[[repos.hooks]]
id = "agents-conventional-commits"
name = "agents-conventional-commits (commit-msg)"
entry = "python -c \"import re,sys; msg=open(sys.argv[1],encoding='utf-8').readline().strip(); ok=bool(re.match(r'^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\([a-z0-9._-]+\\))?!?: .+', msg)) or msg.startswith(('Merge ','Revert ','fixup! ')); sys.exit(0 if ok else not print(f'Error: CES-75 (agents-conventional-commits): commit subject must follow Conventional Commits (type(scope): description). Got: {msg!r}'))\""
language = "system"
stages = ["commit-msg"]

# MARK: validate-pyproject
[[repos]]
repo = "https://github.com/abravalheri/validate-pyproject"
rev = "v0.25"
hooks = [
  { id = "validate-pyproject", files = "^pyproject\\.toml$", priority = 0 }
]

# MARK: ruff-format
[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.4"

[[repos.hooks]]
id = "ruff-format"
priority = 0

# MARK: ruff-check
[[repos.hooks]]
id = "ruff"
args = ["--fix", "--exit-non-zero-on-fix"]
types_or = ["python", "pyi"]
require_serial = true
priority = 1

# MARK: pyrefly
[[repos]]
repo = "local"

[[repos.hooks]]
id = "pyrefly"
name = "pyrefly"
entry = "uvx pyrefly check --config pyproject.toml"
language = "system"
types = ["python"]
pass_filenames = false
priority = 2

# MARK: ast-grep
[[repos.hooks]]
id = "ast-grep"
name = "ast-grep"
entry = "uvx --from ast-grep-cli ast-grep scan"
language = "system"
types = ["python"]
pass_filenames = false
priority = 2

# MARK: file-size-guard
[[repos.hooks]]
id = "file-size-guard"
name = "file-size-guard (400 large / 700 enormous)"
entry = "python -c \"import sys; sys.exit(max([0] + [1 for f in sys.argv[1:] for n in [sum(1 for _ in open(f, errors='ignore'))] if (n >= 700 and not print(f'Error: CES-71 (file-size-guard): {f} is too large ({n} lines, limit is 700)')) or (n >= 400 and not print(f'Warning: CES-71 (file-size-guard): {f} is large ({n} lines, recommended limit is 400)') and False)]))\""
language = "system"
types = ["python"]
priority = 2

# MARK: no-utils
# CES-63: catch-all module names (utils/helpers/aux/misc/common) hide grab-bags of unrelated
# code. The hook only ever runs on files whose basename matches, so it always fails when invoked.
[[repos.hooks]]
id = "no-utils"
name = "no-utils (no catch-all modules)"
entry = "python -c \"import sys; [print(f'Error: CES-63 (no-utils): {f} is a catch-all module — name modules for what they hold, not utils/helpers/aux/misc/common.') for f in sys.argv[1:]]; sys.exit(1 if sys.argv[1:] else 0)\""
language = "system"
files = "(^|/)(utils|helpers|aux|misc|common)\\.py$"
exclude = "(^|/)tests/"
priority = 2

# MARK: repo-shape
# CES-32: notebooks, resources/, reports/, and data/ do not belong inside the import package.
# {{ import_package }} is a copier-style placeholder — resolve it to your top-level package dir
# at install time (the guide instructs the fill); until then this hook never matches.
[[repos.hooks]]
id = "repo-shape"
name = "repo-shape (no notebooks/resources/reports/data in the package)"
entry = "python -c \"import sys; [print(f'Error: CES-32 (repo-shape): {f} does not belong inside the import package — keep notebooks/resources/reports/data outside it.') for f in sys.argv[1:]]; sys.exit(1 if sys.argv[1:] else 0)\""
language = "system"
files = "^{{ import_package }}/(.*\\.ipynb$|(.*/)?(resources|reports|data)/.*)"
priority = 2
