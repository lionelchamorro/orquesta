; Supervisor config for the Orquesta all-in-one container.
; Runs as the ubuntu user (uid 1000). Every child logs to the container's
; stdout/stderr so `docker logs` shows all three services interleaved.

[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
loglevel=info

; ---------------------------------------------------------------------------
; FastAPI backend — loopback only. The frontend reaches it server-side via
; ORQUESTA_API_URL; the browser never touches it directly (no CORS needed).
; It spawns orq-lite per run on ephemeral 127.0.0.1 ports.
; ---------------------------------------------------------------------------
[program:api]
command=/srv/api/.venv/bin/uvicorn --factory orquesta_api.main:create_app --host 127.0.0.1 --port 8000
directory=/data
priority=10
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
stopwaitsecs=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/home/ubuntu",PYTHONUNBUFFERED="1",PATH="/home/ubuntu/.opencode/bin:/usr/local/bin:/usr/bin:/bin",DATABASE_URL="sqlite+aiosqlite:////data/orquesta_api.db",TEAM_PATH="/data/team.json",FLOWS_PATH="/data/flows.json",WORKSPACES_DIR="/data/workspaces",RUN_EXECUTOR="local",ORQ_LITE_BIN="orq-lite",OPENCODE_SERVER_URL="http://127.0.0.1:4096"

; ---------------------------------------------------------------------------
; MCP server — loopback only. Exposes the control plane as agent tools; the
; opencode chat agent connects to it (see deploy/opencode.json) to register
; projects, launch flows, toggle watchers, etc.
; ---------------------------------------------------------------------------
[program:mcp]
command=/srv/api/.venv/bin/python -m orquesta_api.mcp.server
directory=/srv/api
priority=15
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/home/ubuntu",PYTHONUNBUFFERED="1",AUTH_TOKEN="%(ENV_AUTH_TOKEN)s",ORQUESTA_API_URL="http://127.0.0.1:8000",ORQUESTA_MCP_HOST="127.0.0.1",ORQUESTA_MCP_PORT="8765"

; ---------------------------------------------------------------------------
; opencode server — loopback only, backs the global chat (OPENCODE_SERVER_URL).
; NOTE: vanilla `opencode serve` does not expose the custom POST /chat contract
; the frontend expects, so /api/chat degrades to its mock reply until an adapter
; is added. The server itself runs fine for CLI/API use.
; ---------------------------------------------------------------------------
[program:opencode]
command=opencode serve --hostname 127.0.0.1 --port 4096
; OPENCODE_CONFIG loads the orquesta agent + MCP bridge without touching the
; user's mounted ~/.config/opencode (auth stays in ~/.local/share/opencode).
directory=/home/ubuntu
priority=20
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/home/ubuntu",PATH="/home/ubuntu/.opencode/bin:/usr/local/bin:/usr/bin:/bin",OPENCODE_CONFIG="/data/opencode.json"

; ---------------------------------------------------------------------------
; Next.js frontend — the ONLY externally exposed process. Binds 0.0.0.0:3000
; so the external proxy can reach it by IP. Server-side env vars resolve the
; upstreams; nothing here is exposed to the browser.
; ---------------------------------------------------------------------------
[program:web]
command=/app/node_modules/.bin/next start -H 0.0.0.0 -p 3000
directory=/app
priority=30
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=HOME="/home/ubuntu",NODE_ENV="production",NEXT_TELEMETRY_DISABLED="1",PORT="3000",HOSTNAME="0.0.0.0",ORQUESTA_API_URL="http://127.0.0.1:8000",OPENCODE_SERVER_URL="http://127.0.0.1:4096"
