name: pip-audit

# Audit Python dependencies for known vulnerabilities with pip-audit.
# CI-only check: it is intentionally not wired into prek.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-audit weekly so newly disclosed CVEs surface without a code change.
    - cron: "0 6 * * 1"

concurrency:
  group: pip-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.12"
          enable-cache: true

      # Export the fully-resolved, pinned dependency set from uv.lock so the
      # audit matches exactly what gets installed, including every extra.
      - name: Export locked requirements
        run: uv export --frozen --no-emit-project --all-extras --output-file requirements.txt

      - name: Audit dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt
